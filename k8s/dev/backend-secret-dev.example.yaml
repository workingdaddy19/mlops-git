# ============================================================
# [개발] backend-secret-dev 템플릿
#  - 실제 값을 채워 k8s/dev/backend-secret-dev.yaml 로 복사 후 적용하세요.
#      cp k8s/dev/backend-secret-dev.example.yaml k8s/dev/backend-secret-dev.yaml
#      kubectl apply -f k8s/dev/backend-secret-dev.yaml -n mlops
#  - 실값 파일(backend-secret-dev.yaml)은 .gitignore 처리되어 커밋되지 않습니다.
#  - [중요] 운영 데이터 보호를 위해 dev 전용 DB(DB_NAME)와 운영과 다른 SECRET_KEY 사용.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret-dev
  namespace: mlops
type: Opaque
stringData:
  # ---- RDS (dev 전용 DB) ----
  DB_HOST: "<RDS_ENDPOINT>"
  DB_PORT: "5432"
  DB_NAME: "mlops_dev"
  DB_USER: "mlops"
  DB_PASSWORD: "<DB_PASSWORD>"
  # ---- 서비스 연동 URL (운영 서비스와 공유) ----
  MLFLOW_BASE_URL: "http://mlflow.mlops.click"
  MLFLOW_TRACKING_URI: "http://mlflow.mlflow.svc.cluster.local:80"
  MLFLOW_TRACKING_USERNAME: "<MLFLOW_USER>"
  MLFLOW_TRACKING_PASSWORD: "<MLFLOW_PASSWORD>"
  JUPYTER_BASE_URL: "http://jupyterhub.mlops.click"
  AWS_REGION: "ap-northeast-2"
  AWS_DEFAULT_REGION: "ap-northeast-2"
  # ---- 애플리케이션 보안 키 (운영과 다른 값) ----
  SECRET_KEY: "<DEV_RANDOM_SECRET_KEY>"
  # ---- JupyterHub ----
  JUPYTERHUB_ADMIN_TOKEN: "<JUPYTERHUB_ADMIN_TOKEN>"
  JUPYTERHUB_JWT_SECRET: "<JUPYTERHUB_JWT_SECRET>"
  JUPYTER_ENVS: '[{"name":"CPU 환경","server":""},{"name":"GPU 환경","server":"gpu"}]'
  # ---- AWS Athena ----
  ATHENA_REGION: "ap-northeast-2"
  ATHENA_DATABASE: "mlops"
  ATHENA_S3_OUTPUT: "s3://<ATHENA_OUTPUT_BUCKET>/path/"
  # ---- AWS S3 ----
  S3_BUCKET_NAME: "<S3_BUCKET>"
  S3_REGION: "ap-northeast-2"
  # ---- Airflow ----
  AIRFLOW_BASE_URL: "http://airflow.mlops.click"
